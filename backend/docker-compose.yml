version: "3.9"

# ── WHAT IS DOCKER COMPOSE? ───────────────────────────────────────────────────
# Runs multiple containers together as one system.
# Instead of installing Postgres and Redis locally, you run:
#   docker compose up --build
# And everything starts in the right order automatically.
#
# KEY CONCEPTS:
#
# services:
#   Each named block (postgres, redis, api) is one container.
#   They can talk to each other using the service name as hostname.
#   e.g. the api connects to postgres at host "postgres", not "localhost"
#
# ports: "HOST:CONTAINER"
#   Maps a port on YOUR machine to a port inside the container.
#   "5432:5432" → your machine's port 5432 → Postgres inside container
#   This lets you connect to Postgres from your machine with any DB tool.
#
# depends_on + healthcheck:
#   depends_on alone doesn't wait for a service to be READY —
#   just for it to START. healthcheck runs a command to confirm
#   the service is actually accepting connections.
#   condition: service_healthy → only start api when postgres is healthy.
#
# volumes:
#   postgres_data persists your database between container restarts.
#   Without this, all data is lost every time Postgres restarts.
#
# environment:
#   Sets environment variables inside the container.
#   Note: api uses "postgres" and "redis" as hostnames — not "localhost" —
#   because inside Docker, services find each other by service name.
# ─────────────────────────────────────────────────────────────────────────────

volumes:
  postgres_data:   # persists DB data across restarts

networks:
  app-network:
    driver: bridge  # all services share this network

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: transactions_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI App ─────────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Use service names as hostnames (not localhost)
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/transactions_db
      REDIS_URL: redis://redis:6379
      APP_ENV: development
    depends_on:
      postgres:
        condition: service_healthy   # wait for postgres to be ready
      redis:
        condition: service_healthy   # wait for redis to be ready
    networks:
      - app-network
    volumes:
      - .:/app   # mount code so changes reflect without rebuilding
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 